server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:dev-change-me}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:86400000}

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

  oauth2:
    redirect-url: ${OAUTH2_SUCCESS_REDIRECT:http://localhost:5173/oauth-success}

management:
  endpoints:
    web:
      exposure:
        include: health,info