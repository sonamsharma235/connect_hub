server:
  port: ${PORT:8081}
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/connecthub_authDB?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}

app:
  jwt:
    secret: ${JWT_SECRET:dev-change-me}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:86400000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth2:
    redirect-url: ${OAUTH2_SUCCESS_REDIRECT:http://localhost:5173/oauth-success}

management:
  endpoints:
    web:
      exposure:
        include: health,info
